<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weekly Roblox Math Practice</title>

<!-- ✅ FIXED GOOGLE FONT LINK -->
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  background:#0a0f1a;
  color:white;
  font-family:'Nunito',sans-serif;
  margin:0
}
.container{
  max-width:900px;
  margin:auto;
  padding:24px
}
h1,h2{
  font-family:'Fredoka One'
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px
}
button{
  width:100%;
  font-family:'Fredoka One';
  padding:14px;
  font-size:1.1rem;
  border-radius:24px;
  border:none;
  background:#1c7ed6;
  color:white;
  cursor:pointer
}
button:hover{filter:brightness(1.1)}
.card{
  background:#111827;
  border:2px solid #1e2d40;
  border-radius:14px;
  padding:18px;
  margin-top:20px
}
input{
  width:140px;
  padding:6px;
  font-size:1rem;
  margin-top:6px
}
.result{
  margin-top:6px;
  font-weight:bold
}
</style>
</head>

<body>
<div class="container">

<h1>📅 Weekly Roblox Math Practice</h1>
<p>15 minutes per day • Addition & Place Value</p>

<div class="grid">
  <button onclick="openDay('Sunday')">Sunday</button>
  <button onclick="openDay('Monday')">Monday</button>
  <button onclick="openDay('Tuesday')">Tuesday</button>
  <button onclick="openDay('Wednesday')">Wednesday</button>
  <button onclick="openDay('Thursday')">Thursday</button>
  <button onclick="openDay('Friday')">Friday</button>
  <button onclick="openDay('Saturday')">Saturday</button>
</div>

<div class="card" id="lesson" style="display:none"></div>

</div>

<script>
const practice = {
  Sunday:{warmup:["10 more than 34?",44],add:["47 + 26",73],pv:["Value of 6 in 362?",60]},
  Monday:{warmup:["10 less than 58?",48],add:["38 + 45",83],pv:["Value of 4 in 248?",40]},
  Tuesday:{warmup:["10 more than 71?",81],add:["56 + 27",83],pv:["Value of 7 in 374?",70]},
  Wednesday:{warmup:["10 less than 92?",82],add:["64 + 18",82],pv:["Value of 5 in 451?",50]},
  Thursday:{warmup:["10 more than 49?",59],add:["29 + 36",65],pv:["Value of 3 in 634?",30]},
  Friday:{warmup:["10 less than 67?",57],add:["72 + 19",91],pv:["Value of 8 in 189?",80]},
  Saturday:{warmup:["10 more than 85?",95],add:["48 + 35",83],pv:["Value of 2 in 523?",20]}
};

function openDay(day){
  const d = practice[day];
  const box = document.getElementById("lesson");
  box.style.display = "block";
  box.innerHTML = `
    <h2>${day} – 15‑Minute Practice</h2>

    <p><strong>Warm‑Up:</strong> ${d.warmup[0]}</p>
    <input id="a1" type="number">
    <button onclick="check('a1', ${d.warmup[1]}, 'r1')">Check</button>
    <div id="r1" class="result"></div>

    <p><strong>Addition:</strong> ${d.add[0]}</p>
    <input id="a2" type="number">
    <button onclick="check('a2', ${d.add[1]}, 'r2')">Check</button>
    <div id="r2" class="result"></div>

    <p><strong>Place Value:</strong> ${d.pv[0]}</p>
    <input id="a3" type="number">
    <button onclick="check('a3', ${d.pv[1]}, 'r3')">Check</button>
    <div id="r3" class="result"></div>

    <p>✅ Practice complete! Amazing work.</p>
  `;
}

function check(id, correct, resultId){
  const val = document.getElementById(id).value;
  const res = document.getElementById(resultId);

  if(val === ""){
    res.textContent = "Type an answer first!";
    res.style.color = "#ffd43b";
  } else if(Number(val) === correct){
    res.textContent = "✅ Correct!";
    res.style.color = "#8ce99a";
  } else {
    res.textContent = "❌ Try again!";
    res.style.color = "#ff6b6b";
  }
}
</script>

</body>
</html>
